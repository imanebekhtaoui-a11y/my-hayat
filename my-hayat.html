<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="My Hayat"/>
  <title>My Hayat — حياة</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F7F3EF; overflow-x: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    ::-webkit-scrollbar { display: none; }
    input:focus, select:focus, textarea:focus { outline: none; }
    input[type=date], input[type=time] { color-scheme: light; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
  // localStorage helpers — remplace window.storage
  const LS = 'myhayat_';
  window.storage = {
    get: (key) => {
      try {
        const v = localStorage.getItem(LS + key);
        if (v === null) return null;
        return { key, value: v };
      } catch(e) { return null; }
    },
    set: (key, value) => {
      try { localStorage.setItem(LS + key, value); return { key, value }; } catch(e) { return null; }
    },
    list: (prefix) => {
      try {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(LS + (prefix||''))) keys.push(k.slice(LS.length));
        }
        return { keys };
      } catch(e) { return { keys: [] }; }
    },
    delete: (key) => {
      try { localStorage.removeItem(LS + key); return { key, deleted: true }; } catch(e) { return null; }
    }
  };
  </script>
